version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: attendance-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./attendance.db}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-dev}
      - CUDA_ENABLED=${CUDA_ENABLED:-false}
      - GPU_STRICT_MODE=${GPU_STRICT_MODE:-false}
    volumes:
      - ./backend:/app
      - ./data:/app/data

  frontend:
    image: node:20-alpine
    container_name: attendance-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
